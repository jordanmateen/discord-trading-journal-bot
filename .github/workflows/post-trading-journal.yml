name: Post Daily Trading Journal

on:
  schedule:
    - cron: "15 20 * * 1-5"
  workflow_dispatch:

jobs:
  post-journal:
    runs-on: ubuntu-latest

    steps:
      - name: Post daily trading journal to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TODAY=$(TZ="America/New_York" date +"%A, %B %d, %Y")

          TODAY="$TODAY" python3 - <<'PY'
          import json
          import os

          today = os.environ["TODAY"]

          message = f"""# 📓 Daily Trading Journal — {today}

## Daily Check-In
**Mood before trading:**  
**Energy level 1–10:**  
**Did I follow my plan?** Yes / No / Mostly  
**Max loss respected?** Yes / No / N/A  

## Trade Summary
**Green / Red / Breakeven:**  
**Number of trades:**  
**Best trade:**  
**Worst trade:**  
**Main setup traded:**  

## Execution Review
**Did I chase?** Yes / No  
**Did I overtrade?** Yes / No  
**Did I move my stop?** Yes / No  
**Was my position size appropriate?** Yes / No  
**Did I take profits according to plan?** Yes / No / Partially  

## If Green
**What did I do well?**  
**Good execution or luck?**  
**What should I repeat tomorrow?**  

## If Red
**What caused the loss?** Bad setup / Bad entry / Bad exit / Oversizing / Chasing / Market / Emotion  
**Did I break a rule?** Yes / No  
**What emotion showed up most?** Fear / Greed / FOMO / Revenge / Hesitation / Frustration  
**One adjustment for tomorrow:**  

## Final Reflection
**One lesson from today:**  
**Grade my trading:** A / B / C / D / F  
**Tomorrow’s focus:**  
"""

          with open("payload.json", "w") as file:
              json.dump({"content": message}, file)
          PY

          curl -i \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHubActions-TradingJournalBot" \
            -X POST \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"
