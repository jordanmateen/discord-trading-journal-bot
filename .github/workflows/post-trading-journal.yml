name: Test Discord Webhook

on:
  workflow_dispatch:

jobs:
  test-webhook:
    runs-on: ubuntu-latest

    steps:
      - name: Test Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "Secret length: ${#DISCORD_WEBHOOK_URL}"

          python3 - <<'PY'
          import os
          import hashlib

          url = os.environ.get("DISCORD_WEBHOOK_URL", "")
          print("Starts with discord webhook URL:", url.startswith("https://discord.com/api/webhooks/"))
          print("Webhook URL sha256:", hashlib.sha256(url.encode()).hexdigest())
          PY

          curl -i \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{"content":"GitHub Actions Discord webhook test"}' \
            "$DISCORD_WEBHOOK_URL"
