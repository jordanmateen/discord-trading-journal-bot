name: Daily Trading Journal

on:
  schedule:
    - cron: "15 20 * * 1-5"
  workflow_dispatch:

jobs:
  post-journal:
    runs-on: ubuntu-latest

    steps:
      - name: Post daily trading journal to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 <<'PY'
          import os
          import json
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]

          today = datetime.now(ZoneInfo("America/New_York")).strftime("%A, %B %d, %Y")

          message = f"""# 📓 Daily Trading Journal — {today}

          ## Daily Check-In
          **Mood before trading:**  
          **Energy level 1–10:**  
          **Did I follow my plan?** Yes / No / Mostly  
          **Max loss respected?** Yes / No / N/A  

          ## Trade Summary
          **Green / Red / Breakeven:**  
          **Number of trades:**  
          **Best trade:**  
          **Worst trade:**  
          **Main setup traded:**  

          ## Execution Review
          **Did I chase?** Yes / No  
          **Did I overtrade?** Yes / No  
          **Did I move my stop?** Yes / No  
          **Was my position size appropriate?** Yes / No  
          **Did I take profits according to plan?** Yes / No / Partially  

          ## If Green
          **What did I do well?**  
          **Good execution or luck?**  
          **What should I repeat tomorrow?**  

          ## If Red
          **What caused the loss?** Bad setup / Bad entry / Bad exit / Oversizing / Chasing / Market / Emotion  
          **Did I break a rule?** Yes / No  
          **What emotion showed up most?** Fear / Greed / FOMO / Revenge / Hesitation / Frustration  
          **One adjustment for tomorrow:**  

          ## Final Reflection
          **One lesson from today:**  
          **Grade my trading:** A / B / C / D / F  
          **Tomorrow’s focus:**  
          """

          payload = json.dumps({"content": message}).encode("utf-8")

          request = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              print(f"Discord response status: {response.status}")
          PY
